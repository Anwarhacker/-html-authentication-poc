<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Authentication System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .dashboard-container {
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">AuthSystem</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link text-white" id="user-greeting">Welcome, User</span>
                    </li>
                    <li class="nav-item">
                        <button id="logout-btn" class="btn btn-outline-light ms-2">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card shadow">
                    <div class="card-header bg-white">
                        <h4 class="mb-0">Dashboard</h4>
                    </div>
                    <div class="card-body p-4">
                        <div id="dashboard-alert" class="alert alert-success" role="alert">
                            You have successfully logged in!
                        </div>
                        <h5 class="card-title">User Information</h5>
                        <p class="card-text"><strong>Name:</strong> <span id="user-name">Loading...</span></p>
                        <p class="card-text"><strong>Email:</strong> <span id="user-email">Loading...</span></p>

                        <hr>

                        <h5 class="card-title mt-4">System Status</h5>
                        <div class="row text-center mt-3">
                            <div class="col-sm-4">
                                <div class="card bg-light">
                                    <div class="card-body">
                                        <h3 class="text-primary">Active</h3>
                                        <p class="text-muted small mb-0">Session Status</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="card bg-light">
                                    <div class="card-body">
                                        <h3 class="text-success">Secure</h3>
                                        <p class="text-muted small mb-0">Connection</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="card bg-light">
                                    <div class="card-body">
                                        <h3 class="text-info">v1.0</h3>
                                        <p class="text-muted small mb-0">API Version</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');

            if (!token || !userStr) {
                // Not logged in, redirect to login page
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userStr);

            // Populate user data
            document.getElementById('user-greeting').textContent = `Welcome, ${user.name}`;
            document.getElementById('user-name').textContent = user.name;
            document.getElementById('user-email').textContent = user.email;

            // Hide alert after 3 seconds
            setTimeout(() => {
                const alertBox = document.getElementById('dashboard-alert');
                if (alertBox) alertBox.style.display = 'none';
            }, 3000);

            // Logout logic
            document.getElementById('logout-btn').addEventListener('click', async () => {
                try {
                    await fetch('http://localhost:5000/api/logout', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                } catch (error) {
                    console.error('Error during logout:', error);
                } finally {
                    // Always clear local storage and redirect
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                }
            });
        });
    </script>
</body>
</html>
